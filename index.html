<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Renengi FF" />
<title>Renengi FF</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap">
<style>
  :root{
    --paper:#EDE7DA; --ink:#21201C; --navy:#1F3A5F; --steel:#5B7C99;
    --rust:#B54B32; --moss:#52683D; --line:#C9C2B2;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;-webkit-tap-highlight-color:transparent;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .disp{font-family:'Space Grotesk',sans-serif;font-weight:600;}
  header{border-bottom:2px solid var(--ink);padding:24px 20px 0;}
  .wrap{max-width:820px;margin:0 auto;}
  .eyebrow{font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--steel);}
  h1{font-size:26px;margin:4px 0 2px;font-family:'Space Grotesk',sans-serif;font-weight:700;}
  .sub{font-size:13px;color:var(--steel);margin:0 0 16px;}
  .toprow{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .reset{font-size:11px;color:var(--steel);background:none;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:4px;}
  .reset:hover{color:var(--rust);}
  nav{display:flex;gap:4px;overflow-x:auto;margin-top:6px;}
  nav button{
    flex-shrink:0;padding:10px 16px;font-size:14px;font-family:'Space Grotesk',sans-serif;font-weight:600;
    background:transparent;border:2px solid transparent;border-bottom:none;border-radius:6px 6px 0 0;
    color:var(--steel);cursor:pointer;
  }
  nav button.active{background:#fff;border-color:var(--ink);color:var(--ink);}
  main{padding:20px;}
  .sheet{max-width:820px;margin:0 auto;background:#fff;border:2px solid var(--ink);border-top:none;border-radius:0 0 6px 6px;padding:22px;min-height:420px;}
  .sheethead{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid var(--ink);padding-bottom:12px;margin-bottom:20px;}
  .sheethead h2{font-size:22px;margin:2px 0 0;}
  .folha{text-align:right;color:var(--steel);}
  .folha p{margin:0;}
  input,textarea,select{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:4px;padding:8px 10px;outline:none;background:#fff;}
  input:focus,textarea:focus,select:focus{border-color:var(--navy);}
  button.btn{background:var(--navy);color:#fff;border:none;border-radius:4px;padding:8px 16px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;}
  button.btn:hover{background:#16293F;}
  .row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .row input[type="text"], .row input:not([type]){flex:1;min-width:160px;}
  .item{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:5px;padding:10px 14px;margin-bottom:6px;}
  .item input[type=text]{flex:1;border:none;background:transparent;}
  .item input[type=date]{border:none;background:transparent;color:var(--steel);font-family:'IBM Plex Mono',monospace;font-size:12px;}
  .pill{font-size:12px;padding:4px 10px;border-radius:999px;font-family:'IBM Plex Mono',monospace;cursor:pointer;}
  .del{background:none;border:none;color:var(--rust);opacity:.6;cursor:pointer;}
  .del:hover{opacity:1;}
  .empty{border:1px dashed var(--line);border-radius:6px;padding:36px;text-align:center;color:var(--steel);}
  table{width:100%;border-collapse:collapse;font-size:14px;}
  thead tr{background:var(--navy);color:#fff;text-transform:uppercase;font-size:11px;letter-spacing:.1em;font-family:'IBM Plex Mono',monospace;}
  th,td{padding:8px 10px;text-align:left;}
  td.num{text-align:right;font-family:'IBM Plex Mono',monospace;}
  tbody tr:nth-child(even){background:#F7F4EC;}
  tfoot td{border-top:2px solid var(--ink);font-weight:600;}
  .checkbox{width:20px;height:20px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:#fff;}
  .checkbox.done{background:var(--moss);border-color:var(--moss);color:#fff;}
  .progress{height:6px;background:#E4DECF;border-radius:99px;overflow:hidden;width:160px;}
  .progress > div{height:100%;background:var(--moss);}
  .grid3{display:grid;grid-template-columns:1fr;gap:14px;}
  @media(min-width:700px){.grid3{grid-template-columns:repeat(3,1fr);}}
  .apt{border:1px solid var(--line);border-radius:6px;overflow:hidden;background:#fff;}
  .apthead{background:var(--ink);color:var(--paper);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;}
  .apthead .code{font-size:18px;font-family:'Space Grotesk',sans-serif;font-weight:600;}
  .apthead .tag{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--line);font-family:'IBM Plex Mono',monospace;}
  .aptbody{padding:14px;display:flex;flex-direction:column;gap:10px;}
  label.small{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--steel);font-family:'IBM Plex Mono',monospace;display:block;margin-bottom:4px;}
  textarea{width:100%;resize:none;}
  footer{text-align:center;font-size:11px;color:#8A8578;font-family:'IBM Plex Mono',monospace;padding:0 20px 30px;}

  #lockScreen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
  #lockBox{background:#fff;border-radius:8px;padding:32px 28px;max-width:320px;width:100%;text-align:center;}
  #lockBox .eyebrow{margin-bottom:2px;}
  #lockBox h2{font-size:20px;margin:2px 0 18px;font-family:'Space Grotesk',sans-serif;font-weight:600;}
  #lockBox input{width:100%;text-align:center;font-size:16px;padding:10px;margin-bottom:10px;letter-spacing:2px;}
  #lockBox button{width:100%;padding:10px;}
  #lockError{color:var(--rust);font-size:12px;font-family:'IBM Plex Mono',monospace;min-height:16px;margin-bottom:4px;}
  #appRoot{display:none;}
</style>
</head>
<body>

<div id="lockScreen">
  <div id="lockBox">
    <p class="eyebrow">Renengi · Acesso restrito</p>
    <h2>Renengi FF</h2>
    <input type="password" id="lockPassword" placeholder="Password" autocomplete="off" />
    <p id="lockError"></p>
    <button class="btn" id="lockSubmit" style="justify-content:center;">Entrar</button>
  </div>
</div>

<div id="appRoot">
<header>
  <div class="wrap">
    <div class="toprow">
      <div>
        <p class="eyebrow">Renengi · Direção de Obra</p>
        <h1>Renengi FF</h1>
        <p class="sub">3 frações · Rés do Chão · 1º Andar · 2º Andar</p>
      </div>
      <button class="reset" id="resetBtn">↺ repor dados</button>
    </div>
    <nav id="tabs"></nav>
  </div>
</header>

<main>
  <div class="sheet">
    <div class="sheethead">
      <div>
        <p class="eyebrow" id="sheetEyebrow">Prédio ARU · Figueira da Foz</p>
        <h2 id="sheetTitle">Planeamento</h2>
      </div>
      <div class="folha"><p class="eyebrow">Folha</p><p class="mono" style="font-size:18px;" id="sheetNum">01/04</p></div>
    </div>
    <div id="content"></div>
  </div>
  <footer>Os dados ficam guardados apenas neste dispositivo (localStorage).</footer>
</main>
</div>

<script>
const TABS = [
  {id:'planeamento', label:'Planeamento', sheet:'01'},
  {id:'preobra', label:'Pré-Obra', sheet:'02'},
  {id:'documentos', label:'Documentos', sheet:'03'},
  {id:'elementos', label:'Elementos do Prédio', sheet:'04'},
];
const STATUS = [
  {id:'pendente', label:'Pendente', color:'#B54B32'},
  {id:'em_curso', label:'Em curso', color:'#5B7C99'},
  {id:'concluido', label:'Concluído', color:'#52683D'},
];
const DOC_TIPOS = ['Orçamento','Proposta','Fatura','Contrato','Outro'];
const DEFAULT_PREOBRA = [
  "Levantamento topográfico atualizado",
  "Projeto de arquitetura aprovado pela câmara",
  "Projetos de especialidades entregues",
  "Reconhecimento ARU / benefícios fiscais confirmados",
  "Licença de obras emitida",
  "Consignação de obra agendada",
  "Estaleiro delimitado e sinalizado",
  "Ramais provisórios (água/luz) assegurados",
  "Seguro de obra ativo",
  "Livro de obra aberto",
];
const uid = () => Math.random().toString(36).slice(2,10);

function load(key, fallback){
  try{
    const raw = localStorage.getItem('rp_'+key);
    if(!raw) return fallback;
    return JSON.parse(raw);
  }catch(e){ return fallback; }
}
function save(key, value){
  try{ localStorage.setItem('rp_'+key, JSON.stringify(value)); }catch(e){}
}

let state = {
  planeamento: load('planeamento', []),
  preobra: load('preobra', DEFAULT_PREOBRA.map(t=>({id:uid(), texto:t, feito:false}))),
  documentos: load('documentos', []),
  elementos: load('elementos', [
    {id:uid(), code:'R/C', nome:'Apartamento Rés do Chão', status:'pendente', notas:''},
    {id:uid(), code:'1º', nome:'Apartamento 1º Andar', status:'pendente', notas:''},
    {id:uid(), code:'2º', nome:'Apartamento 2º Andar', status:'pendente', notas:''},
  ]),
};
let active = 'planeamento';

function persist(key){ save(key, state[key]); }

function statusPill(current, onChangeAttr){
  const s = STATUS.find(x=>x.id===current) || STATUS[0];
  const opts = STATUS.map(o=>`<option value="${o.id}" ${o.id===current?'selected':''}>${o.label}</option>`).join('');
  return `<select class="pill" style="color:${s.color};border:1px solid ${s.color};background:${s.color}14;" ${onChangeAttr}>${opts}</select>`;
}

function renderTabs(){
  const nav = document.getElementById('tabs');
  nav.innerHTML = TABS.map(t=>`<button data-tab="${t.id}" class="${t.id===active?'active':''}">${t.label}</button>`).join('');
  nav.querySelectorAll('button').forEach(b=>b.addEventListener('click', ()=>{ active=b.dataset.tab; render(); }));
}

function renderPlaneamento(){
  const c = document.getElementById('content');
  const rows = state.planeamento.map(t=>`
    <div class="item" data-id="${t.id}">
      <input type="text" value="${escapeHtml(t.tarefa)}" data-field="tarefa" />
      <input type="date" value="${t.data||''}" data-field="data" />
      ${statusPill(t.status, 'data-field="status"')}
      <button class="del" data-action="del">✕</button>
    </div>`).join('');
  c.innerHTML = `
    <div class="row">
      <input type="text" id="novaTarefa" placeholder="Nova fase ou tarefa" />
      <input type="date" id="novaData" />
      <button class="btn" id="addTarefa">+ Adicionar</button>
    </div>
    <div id="lista">${state.planeamento.length ? rows : '<div class="empty">Sem fases registadas. Adicione a primeira acima.</div>'}</div>
  `;
  document.getElementById('addTarefa').onclick = ()=>{
    const tarefa = document.getElementById('novaTarefa').value.trim();
    const data = document.getElementById('novaData').value;
    if(!tarefa) return;
    state.planeamento.push({id:uid(), tarefa, data, status:'pendente'});
    persist('planeamento'); render();
  };
  c.querySelectorAll('#lista .item').forEach(row=>{
    const id = row.dataset.id;
    row.querySelectorAll('[data-field]').forEach(inp=>{
      inp.addEventListener('change', ()=>{
        const item = state.planeamento.find(x=>x.id===id);
        item[inp.dataset.field] = inp.value;
        persist('planeamento');
      });
    });
    row.querySelector('[data-action=del]').addEventListener('click', ()=>{
      state.planeamento = state.planeamento.filter(x=>x.id!==id);
      persist('planeamento'); render();
    });
  });
}

function renderPreObra(){
  const c = document.getElementById('content');
  const done = state.preobra.filter(x=>x.feito).length;
  const total = state.preobra.length;
  const pct = total ? Math.round(done/total*100) : 0;
  const rows = state.preobra.map(it=>`
    <div class="item" data-id="${it.id}">
      <div class="checkbox ${it.feito?'done':''}" data-action="toggle">${it.feito?'✓':''}</div>
      <span style="flex:1;${it.feito?'text-decoration:line-through;color:#8A8578;':''}">${escapeHtml(it.texto)}</span>
      <button class="del" data-action="del">✕</button>
    </div>`).join('');
  c.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <p class="mono" style="font-size:12px;color:var(--steel);text-transform:uppercase;letter-spacing:.1em;">${done}/${total} concluídos</p>
      <div class="progress"><div style="width:${pct}%"></div></div>
    </div>
    <div id="lista">${rows}</div>
    <div class="row" style="margin-top:14px;">
      <input type="text" id="novoItem" placeholder="Novo item da checklist" />
      <button class="btn" id="addItem">+ Adicionar</button>
    </div>
  `;
  document.getElementById('addItem').onclick = ()=>{
    const texto = document.getElementById('novoItem').value.trim();
    if(!texto) return;
    state.preobra.push({id:uid(), texto, feito:false});
    persist('preobra'); render();
  };
  c.querySelectorAll('#lista .item').forEach(row=>{
    const id = row.dataset.id;
    row.querySelector('[data-action=toggle]').addEventListener('click', ()=>{
      const item = state.preobra.find(x=>x.id===id);
      item.feito = !item.feito;
      persist('preobra'); render();
    });
    row.querySelector('[data-action=del]').addEventListener('click', ()=>{
      state.preobra = state.preobra.filter(x=>x.id!==id);
      persist('preobra'); render();
    });
  });
}

function renderDocumentos(){
  const c = document.getElementById('content');
  const total = state.documentos.reduce((s,d)=>s+(Number(d.valor)||0),0);
  const fmt = n => n.toLocaleString('pt-PT',{style:'currency',currency:'EUR'});
  const rows = state.documentos.map(d=>`
    <tr data-id="${d.id}">
      <td style="color:var(--steel)">${d.tipo}</td>
      <td>${escapeHtml(d.descricao)}</td>
      <td class="num">${fmt(Number(d.valor)||0)}</td>
      <td class="mono" style="color:var(--steel);font-size:12px;">${d.data||'—'}</td>
      <td style="text-align:right;"><button class="del" data-action="del">✕</button></td>
    </tr>`).join('');
  c.innerHTML = `
    <div class="row">
      <select id="novoTipo">${DOC_TIPOS.map(t=>`<option>${t}</option>`).join('')}</select>
      <input type="text" id="novaDesc" placeholder="Descrição" style="flex:2;" />
      <input type="text" id="novoValor" placeholder="Valor €" inputmode="decimal" style="max-width:110px;" />
      <input type="date" id="novaDataDoc" />
      <button class="btn" id="addDoc">+</button>
    </div>
    ${state.documentos.length ? `
    <div style="border:1px solid var(--line);border-radius:6px;overflow:hidden;">
      <table>
        <thead><tr><th>Tipo</th><th>Descrição</th><th style="text-align:right;">Valor</th><th>Data</th><th></th></tr></thead>
        <tbody id="lista">${rows}</tbody>
        <tfoot><tr><td colspan="2" style="text-align:right;text-transform:uppercase;font-size:12px;letter-spacing:.1em;color:var(--steel);" class="mono">Total</td><td class="num">${fmt(total)}</td><td colspan="2"></td></tr></tfoot>
      </table>
    </div>` : '<div class="empty">Sem documentos registados.</div>'}
  `;
  document.getElementById('addDoc').onclick = ()=>{
    const descricao = document.getElementById('novaDesc').value.trim();
    if(!descricao) return;
    state.documentos.push({
      id:uid(),
      tipo:document.getElementById('novoTipo').value,
      descricao,
      valor: parseFloat(document.getElementById('novoValor').value)||0,
      data: document.getElementById('novaDataDoc').value,
    });
    persist('documentos'); render();
  };
  c.querySelectorAll('#lista [data-action=del]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.closest('tr').dataset.id;
      state.documentos = state.documentos.filter(x=>x.id!==id);
      persist('documentos'); render();
    });
  });
}

function renderElementos(){
  const c = document.getElementById('content');
  c.innerHTML = `<div class="grid3">${state.elementos.map(a=>`
    <div class="apt" data-id="${a.id}">
      <div class="apthead"><span class="code">${a.code}</span><span class="tag">Fração</span></div>
      <div class="aptbody">
        <input type="text" data-field="nome" value="${escapeHtml(a.nome)}" style="font-weight:500;border:none;padding:0 0 4px;border-bottom:1px solid transparent;" />
        <div>
          <label class="small">Estado da obra</label>
          ${statusPill(a.status, 'data-field="status"')}
        </div>
        <div>
          <label class="small">Notas</label>
          <textarea rows="3" data-field="notas" placeholder="Observações sobre esta fração…">${escapeHtml(a.notas)}</textarea>
        </div>
      </div>
    </div>`).join('')}</div>`;
  c.querySelectorAll('.apt').forEach(card=>{
    const id = card.dataset.id;
    card.querySelectorAll('[data-field]').forEach(inp=>{
      inp.addEventListener('change', ()=>{
        const item = state.elementos.find(x=>x.id===id);
        item[inp.dataset.field] = inp.value;
        persist('elementos');
      });
    });
  });
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function render(){
  renderTabs();
  const tab = TABS.find(t=>t.id===active);
  document.getElementById('sheetTitle').textContent = tab.label;
  document.getElementById('sheetNum').textContent = tab.sheet + '/04';
  if(active==='planeamento') renderPlaneamento();
  if(active==='preobra') renderPreObra();
  if(active==='documentos') renderDocumentos();
  if(active==='elementos') renderElementos();
}

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(!confirm('Apagar todos os dados guardados neste dispositivo?')) return;
  localStorage.removeItem('rp_planeamento');
  localStorage.removeItem('rp_preobra');
  localStorage.removeItem('rp_documentos');
  localStorage.removeItem('rp_elementos');
  state = {
    planeamento: [],
    preobra: DEFAULT_PREOBRA.map(t=>({id:uid(), texto:t, feito:false})),
    documentos: [],
    elementos: [
      {id:uid(), code:'R/C', nome:'Apartamento Rés do Chão', status:'pendente', notas:''},
      {id:uid(), code:'1º', nome:'Apartamento 1º Andar', status:'pendente', notas:''},
      {id:uid(), code:'2º', nome:'Apartamento 2º Andar', status:'pendente', notas:''},
    ],
  };
  ['planeamento','preobra','documentos','elementos'].forEach(persist);
  render();
});

render();

/* ---------------------------- BLOQUEIO POR PASSWORD ---------------------------- */
const LOCK_PASSWORD = "7799";
const LOCK_SESSION_KEY = "rp_unlocked";

function unlock(){
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('appRoot').style.display = 'block';
}

if (sessionStorage.getItem(LOCK_SESSION_KEY) === '1') {
  unlock();
}

document.getElementById('lockSubmit').addEventListener('click', tryUnlock);
document.getElementById('lockPassword').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') tryUnlock();
});

function tryUnlock(){
  const val = document.getElementById('lockPassword').value;
  if (val === LOCK_PASSWORD) {
    sessionStorage.setItem(LOCK_SESSION_KEY, '1');
    unlock();
  } else {
    document.getElementById('lockError').textContent = 'Password incorreta';
    document.getElementById('lockPassword').value = '';
  }
}
</script>
</body>
</html>
